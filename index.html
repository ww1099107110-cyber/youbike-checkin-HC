<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚲 YouBike 強化版作業系統</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; text-align: center; padding: 15px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        #info { background: #e8f4fd; padding: 10px; margin-bottom: 15px; border-radius: 12px; font-size: 14px; border-left: 5px solid #2196f3; text-align: left; }
        .input-area { text-align: left; margin-bottom: 15px; background: #fafafa; padding: 10px; border-radius: 10px; }
        .form-item { margin-bottom: 8px; }
        .form-item label { font-weight: bold; display: block; font-size: 13px; color: #555; margin-bottom: 3px; }
        .form-item input { width: 100%; height: 38px; font-size: 18px; text-align: center; border-radius: 8px; border: 1px solid #ddd; box-sizing: border-box; }
        #otherNote { text-align: left; padding: 0 10px; font-size: 14px; }
        .btn { display: block; width: 100%; height: 65px; margin: 10px 0; font-size: 20px; font-weight: bold; color: white; border: none; border-radius: 15px; cursor: pointer; }
        .btn-in { background: #28a745; }
        .btn-out { background: #dc3545; }
        .btn:disabled { background: #ccc; opacity: 0.6; }
        #loader { font-weight: bold; color: #007bff; margin: 10px 0; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h3>🚲 YouBike 作業系統 V2</h3>
        <div id="info">正在讀取身分...</div>
        <div id="loader">⌛ 處理中，請稍候...</div>

        <div class="input-area">
            <div class="form-item"><label>1. 換電數量：</label><input type="number" id="batteryCount" value="0"></div>
            <div class="form-item"><label>2. 綁車數量：</label><input type="number" id="bindCount" value="0"></div>
            <div class="form-item"><label>3. 解車數量：</label><input type="number" id="unbindCount" value="0"></div>
            <div class="form-item"><label>4. 一級數量：</label><input type="number" id="level1Count" value="0"></div>
            <div class="form-item"><label>5. 其他作業 (內容+數量)：</label><input type="text" id="otherNote" placeholder="例：補胎 2"></div>
        </div>

        <button class="btn btn-in" id="btnIn" onclick="send('到站')" disabled>到站打卡</button>
        <button class="btn btn-out" id="btnOut" onclick="send('離站')" disabled>離站打卡</button>
    </div>

    <script>
    const LIFF_ID = "2009736137-c8JGtpLd"; 
    const GAS_URL = "https://script.google.com/macros/s/AKfycbwYrRcVt_ziOFBahj56aPkMEmFRtY9SybWEDSwbVMQxMSzHTcafRsQRPpgZvurgmwbY/exec"; 

    let finalName = "未辨識";
    let finalId = "N/A";

    async function initLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            finalName = profile.displayName;
            finalId = "LINE_" + profile.userId.substring(0, 5);
            document.getElementById('info').innerHTML = `人員：${finalName}<br>識別：${finalId}`;
            document.getElementById('btnIn').disabled = false;
            document.getElementById('btnOut').disabled = false;
        } catch (err) {
            document.getElementById('info').innerText = "❌ 載入失敗";
        }
    }
    initLiff();

    function send(status) {
        document.getElementById('loader').style.display = 'block';
        document.getElementById('btnIn').disabled = true;
        document.getElementById('btnOut').disabled = true;

        const data = {
            battery: document.getElementById('batteryCount').value,
            bind: document.getElementById('bindCount').value,
            unbind: document.getElementById('unbindCount').value,
            level1: document.getElementById('level1Count').value,
            other: document.getElementById('otherNote').value
        };

        navigator.geolocation.getCurrentPosition(function(pos) {
            fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    name: finalName,
                    id: finalId,
                    status: status,
                    counts: data,
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude
                })
            }).then(() => {
                alert(`✅ ${status}成功！`);
                location.reload();
            }).catch(() => {
                alert("❌ 傳送失敗");
                location.reload();
            });
        }, function(err) {
            alert("❌ 請開啟 GPS 定位");
            location.reload();
        }, { enableHighAccuracy: true });
    }
    </script>
</body>
</html>
