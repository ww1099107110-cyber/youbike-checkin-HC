<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🚲 YouBike 作業系統</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        body { background: #f0f2f5; font-family: sans-serif; text-align: center; padding: 15px; }
        .card { background: white; border-radius: 20px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 400px; margin: auto; }
        #info { background: #fff9e6; padding: 10px; margin-bottom: 15px; border-radius: 12px; font-size: 14px; border-left: 5px solid #ffc107; text-align: left; }
        #loader { color: #666; margin-bottom: 10px; font-weight: bold; }
        
        .input-area { text-align: left; margin-bottom: 15px; }
        .form-item { margin-bottom: 10px; }
        .form-item label { font-weight: bold; display: block; font-size: 14px; color: #333; margin-bottom: 4px; }
        .form-item input { width: 100%; height: 40px; font-size: 18px; text-align: center; border-radius: 8px; border: 1px solid #ccc; box-sizing: border-box; }
        
        /* 其他數量輸入框稍大一點以便填寫文字 */
        #otherNote { text-align: left; padding: 0 10px; font-size: 16px; }

        .btn { display: block; width: 100%; height: 70px; margin: 10px 0; font-size: 22px; font-weight: bold; color: white; border: none; border-radius: 15px; cursor: pointer; }
        .btn-in { background: #28a745; }
        .btn-out { background: #dc3545; }
        .btn:disabled { background: #ccc; opacity: 0.6; }
    </style>
</head>
<body>
    <div class="card">
        <h3>🚲 YouBike 作業打卡</h3>
        <div id="loader">🔄 初始化 LINE...</div>
        <div id="info" style="display:none;"></div>

        <div class="input-area">
            <div class="form-item">
                <label>1. 換電數量：</label>
                <input type="number" id="batteryCount" placeholder="0" value="0">
            </div>
            <div class="form-item">
                <label>2. 綁車數量：</label>
                <input type="number" id="bindCount" placeholder="0" value="0">
            </div>
            <div class="form-item">
                <label>3. 解車數量：</label>
                <input type="number" id="unbindCount" placeholder="0" value="0">
            </div>
            <div class="form-item">
                <label>4. 一級數量：</label>
                <input type="number" id="level1Count" placeholder="0" value="0">
            </div>
            <div class="form-item">
                <label>5. 其他數量 (作業內容+數量)：</label>
                <input type="text" id="otherNote" placeholder="例：補胎 2">
            </div>
        </div>

        <button class="btn btn-in" id="btnIn" onclick="send('到站')" disabled>到站打卡</button>
        <button class="btn btn-out" id="btnOut" onclick="send('離站')" disabled>離站打卡</button>
    </div>

    <script>
    const LIFF_ID = "2009736137-c8JGtpLd"; 
    const GAS_URL = "您的_GAS_網頁應用程式網址"; 

    let finalName = "未辨識";
    let finalId = "LINE_USER";

    async function initLiff() {
        try {
            await liff.init({ liffId: LIFF_ID });
            if (!liff.isLoggedIn()) { liff.login(); return; }
            const profile = await liff.getProfile();
            finalName = profile.displayName;
            finalId = "LINE_" + profile.userId.substring(0, 5);

            document.getElementById('info').innerHTML = `人員：${finalName} (${finalId})`;
            document.getElementById('info').style.display = 'block';
            document.getElementById('loader').style.display = 'none';
            document.getElementById('btnIn').disabled = false;
            document.getElementById('btnOut').disabled = false;
        } catch (err) {
            document.getElementById('loader').innerText = "❌ 載入失敗";
        }
    }
    initLiff();

    function send(status) {
        // 抓取所有欄位數值
        const data = {
            battery: document.getElementById('batteryCount').value,
            bind: document.getElementById('bindCount').value,
            unbind: document.getElementById('unbindCount').value,
            level1: document.getElementById('level1Count').value,
            other: document.getElementById('otherNote').value
        };

        document.getElementById('loader').style.display = 'block';
        document.getElementById('loader').innerText = "⌛ 傳送中...";

        navigator.geolocation.getCurrentPosition(function(pos) {
            fetch(GAS_URL, {
                method: 'POST',
                mode: 'no-cors',
                body: JSON.stringify({
                    name: finalName,
                    id: finalId,
                    status: status,
                    counts: data, // 將所有數量打包傳送
                    lat: pos.coords.latitude,
                    lng: pos.coords.longitude
                })
            }).then(() => {
                alert("✅ 傳送成功！");
                location.reload();
            }).catch(() => {
                alert("❌ 傳送失敗");
                location.reload();
            });
        }, function(err) {
            alert("❌ 請開啟 GPS 定位");
            location.reload();
        }, { enableHighAccuracy: true });
    }
    </script>
</body>
</html>
